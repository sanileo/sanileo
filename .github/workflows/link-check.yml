name: Link Checker

on:
  push:
    paths:
      - "**/*.md"
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 3 AM

jobs:
  linkChecker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v1.10.0
        with:
          args: --verbose --no-progress **/*.md
